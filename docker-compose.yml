services:
  # API / Laravel app
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: studticket-api
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: api
      SERVICE_TAGS: dev
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8000:80"
    networks:
      - studticket-network
    depends_on:
      - db

  # Nginx (Adding this to make the API accessible via 8000, 
  # or I can use a combined image. Let's use a separate nginx for better practice 
  # but the user asked for 3 containers. I'll merge nginx into API or just use PHP artisan serve for simplicity?)
  # Actually, let's use a 4th container if needed, but the user specifically said 3.
  # To keep it to 3, I'll use a PHP image that includes a web server.
  
  # MySQL Service
  db:
    image: mysql:8.0
    container_name: studticket-db
    restart: unless-stopped
    tty: true
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: studticket
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: user
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - studticket-network

  # phpMyAdmin Service
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: studticket-pma
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    networks:
      - studticket-network
    depends_on:
      - db

networks:
  studticket-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
